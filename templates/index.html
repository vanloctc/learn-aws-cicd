<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS Realtime Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #050a0e;
      --bg2:         #0b1622;
      --cyan:        #00f5d4;
      --cyan-dim:    #00b89c;
      --amber:       #ffb703;
      --red:         #ef233c;
      --text:        #cdd6f4;
      --text-muted:  #6272a4;
      --border:      rgba(0,245,212,.18);
      --glow:        0 0 18px rgba(0,245,212,.45), 0 0 60px rgba(0,245,212,.15);
      --glow-amber:  0 0 18px rgba(255,183,3,.45);
    }

    /* ─── Body / Layout ─────────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,212,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,212,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove { to { background-position: 0 48px; } }

    /* Radial vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, var(--bg) 100%);
      pointer-events: none;
    }

    /* ─── Container ─────────────────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 2rem;
      padding: 2rem;
    }

    /* ─── Header badge ──────────────────────────────────────────── */
    .aws-badge {
      display: flex; align-items: center; gap: .6rem;
      border: 1px solid var(--border);
      background: rgba(0,245,212,.05);
      padding: .45rem 1.2rem;
      border-radius: 2rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      letter-spacing: .12em;
      color: var(--cyan-dim);
      animation: fadeSlideDown .6s ease both;
    }
    .aws-badge .dot {
      width: 7px; height: 7px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: var(--glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%     { opacity:.5; transform:scale(.7); }
    }

    /* ─── Clock card ────────────────────────────────────────────── */
    .clock-card {
      position: relative;
      border: 1px solid var(--border);
      background: linear-gradient(145deg, rgba(11,22,34,.9), rgba(5,10,14,.95));
      border-radius: 20px;
      padding: 3.5rem 5rem;
      text-align: center;
      animation: fadeSlideUp .8s ease .1s both;
      backdrop-filter: blur(10px);
    }
    /* corner accents */
    .clock-card::before, .clock-card::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .clock-card::before { top:12px; left:12px;  border-width: 2px 0 0 2px; }
    .clock-card::after  { bottom:12px; right:12px; border-width: 0 2px 2px 0; }

    /* ─── Time display ──────────────────────────────────────────── */
    #time-display {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--cyan);
      text-shadow: var(--glow);
      line-height: 1;
      transition: text-shadow .1s;
    }
    #time-display.tick { text-shadow: var(--glow), 0 0 80px rgba(0,245,212,.3); }

    /* separator blink */
    .sep { animation: blink 1s step-end infinite; }
    @keyframes blink { 50%{ opacity: 0; } }

    /* ─── Date display ──────────────────────────────────────────── */
    #date-display {
      margin-top: 1rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      letter-spacing: .18em;
      color: var(--amber);
      text-shadow: var(--glow-amber);
      text-transform: uppercase;
    }

    /* ─── Timezone pill ─────────────────────────────────────────── */
    #timezone-display {
      display: inline-block;
      margin-top: .8rem;
      padding: .28rem .9rem;
      border: 1px solid rgba(255,183,3,.3);
      border-radius: 1rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      letter-spacing: .12em;
      color: var(--amber);
      opacity: .75;
    }

    /* ─── Stats row ─────────────────────────────────────────────── */
    .stats {
      display: flex; gap: 1.2rem; flex-wrap: wrap;
      justify-content: center;
      animation: fadeSlideUp .8s ease .25s both;
    }
    .stat-card {
      border: 1px solid var(--border);
      background: rgba(0,245,212,.03);
      border-radius: 12px;
      padding: 1rem 1.6rem;
      min-width: 180px;
      text-align: center;
      transition: border-color .3s, background .3s;
    }
    .stat-card:hover {
      border-color: rgba(0,245,212,.5);
      background: rgba(0,245,212,.07);
    }
    .stat-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: .95rem;
      font-weight: 700;
      color: var(--cyan);
    }
    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: #50fa7b; }

    /* ─── Pipeline status bar ───────────────────────────────────── */
    .pipeline {
      display: flex; align-items: center; gap: 0;
      animation: fadeSlideUp .8s ease .4s both;
    }
    .stage {
      display: flex; flex-direction: column;
      align-items: center; gap: .4rem;
      position: relative;
    }
    .stage:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 14px; left: calc(50% + 18px);
      width: 60px; height: 2px;
      background: linear-gradient(90deg, var(--cyan-dim), transparent);
    }
    .stage-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      background: var(--bg2);
      transition: border-color .3s, box-shadow .3s;
    }
    .stage-icon.active {
      border-color: var(--cyan);
      box-shadow: var(--glow);
    }
    .stage-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .58rem;
      letter-spacing: .1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .stage:not(:last-child) { margin-right: 60px; }

    /* ─── Connection status ─────────────────────────────────────── */
    #conn-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      letter-spacing: .12em;
      color: var(--text-muted);
      animation: fadeSlideUp .8s ease .5s both;
    }
    #conn-status span { color: #50fa7b; }
    #conn-status.error span { color: var(--red); }

    /* ─── Animations ────────────────────────────────────────────── */
    @keyframes fadeSlideDown {
      from { opacity:0; transform:translateY(-16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .clock-card { padding: 2.5rem 2rem; }
      .stage:not(:last-child) { margin-right: 40px; }
      .stage:not(:last-child)::after { width: 40px; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Badge -->
    <div class="aws-badge">
      <span class="dot"></span>
      AWS CODEPIPELINE · CODEBUILD 123 · CODEDEPLOY
    </div>

    <!-- Clock card -->
    <div class="clock-card">
      <div id="time-display">--<span class="sep">:</span>--<span class="sep">:</span>--</div>
      <div id="date-display">Loading...</div>
      <div id="timezone-display">TZ: ---</div>
    </div>

    <!-- Stats row -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">⚡ API Latency</div>
        <div class="stat-value" id="stat-latency">--- ms</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🔄 Poll Count</div>
        <div class="stat-value amber" id="stat-poll">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✅ Health</div>
        <div class="stat-value green" id="stat-health">HEALTHY</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🏷 Build</div>
        <div class="stat-value amber" id="stat-build">local</div>
      </div>
    </div>

    <!-- AWS Pipeline stages -->
    <div class="pipeline">
      <div class="stage">
        <div class="stage-icon active">📦</div>
        <div class="stage-label">Source</div>
      </div>
      <div class="stage">
        <div class="stage-icon active">🔨</div>
        <div class="stage-label">Build</div>
      </div>
      <div class="stage">
        <div class="stage-icon active">🧪</div>
        <div class="stage-label">Test</div>
      </div>
      <div class="stage">
        <div class="stage-icon active">🚀</div>
        <div class="stage-label">Deploy</div>
      </div>
    </div>

    <!-- Connection status -->
    <div id="conn-status">SERVER SYNC · <span>CONNECTED</span> · Polling every 1s</div>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let pollCount  = 0;
    let consecutive_errors = 0;

    // ── Fetch time from Flask API ──────────────────────────────────────────
    async function fetchTime() {
      const t0 = performance.now();
      try {
        const res  = await fetch('/api/time');
        const data = await res.json();
        const lat  = Math.round(performance.now() - t0);

        // Update clock
        const timeParts = data.time.split(':');
        document.getElementById('time-display').innerHTML =
          `${timeParts[0]}<span class="sep">:</span>${timeParts[1]}<span class="sep">:</span>${timeParts[2]}`;

        document.getElementById('date-display').textContent   = data.date.toUpperCase();
        document.getElementById('timezone-display').textContent = `TZ: ${data.timezone}`;

        // Stats
        document.getElementById('stat-latency').textContent = `${lat} ms`;
        document.getElementById('stat-poll').textContent    = ++pollCount;

        // Tick flash
        const d = document.getElementById('time-display');
        d.classList.add('tick');
        setTimeout(() => d.classList.remove('tick'), 120);

        // Connection ok
        consecutive_errors = 0;
        const cs = document.getElementById('conn-status');
        cs.className = '';
        cs.innerHTML = `SERVER SYNC · <span>CONNECTED</span> · Polling every 1s`;

      } catch (e) {
        consecutive_errors++;
        const cs = document.getElementById('conn-status');
        cs.className = 'error';
        cs.innerHTML = `SERVER SYNC · <span>ERROR (${consecutive_errors})</span> · Retrying...`;
        document.getElementById('stat-health').textContent = 'DEGRADED';
      }
    }

    // ── Load version info ──────────────────────────────────────────────────
    async function fetchVersion() {
      try {
        const res  = await fetch('/version');
        const data = await res.json();
        const bid  = (data.build_id || 'local').split(':').pop().substring(0, 10);
        document.getElementById('stat-build').textContent = bid;
      } catch (_) {}
    }

    // ── Boot ───────────────────────────────────────────────────────────────
    fetchTime();
    fetchVersion();
    setInterval(fetchTime, 1000);   // 1-second polling
  </script>
</body>
</html>
