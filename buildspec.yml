version: 0.2

env:
  variables:
    AWS_REGION: ap-northeast-1
    ACCOUNT_ID: "618077882381"
    ECR_REGISTRY: "618077882381.dkr.ecr.ap-northeast-1.amazonaws.com"
    IMAGE_REPO_NAME: "sample-cicd"

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - echo Image tag is $IMAGE_TAG

  build:
    commands:
      - echo Building Docker image...
      - docker build -f Dockerfile -t $ECR_REGISTRY/$IMAGE_REPO_NAME:$IMAGE_TAG -t $ECR_REGISTRY/$IMAGE_REPO_NAME:latest .

  post_build:
    commands:
      - echo Pushing Docker images to ECR...
      - docker push $ECR_REGISTRY/$IMAGE_REPO_NAME:$IMAGE_TAG
      - docker push $ECR_REGISTRY/$IMAGE_REPO_NAME:latest
      - echo Build completed successfully.

artifacts:
  files:
    - docker-compose.yml
    - appspec.yml
    - scripts/**/*